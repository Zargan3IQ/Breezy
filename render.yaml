databases:
  - name: breezy-pg
    plan: free
    databaseName: breezy
    user: breezy

services:
  - type: redis
    name: breezy-redis
    plan: free
    ipAllowList: []

  - type: pserv
    name: breezy-user-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/services/user-service/Dockerfile.prod
    dockerContext: ./backend/services/user-service
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: breezy-pg
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: breezy-redis
          type: redis
          property: connectionString

  - type: pserv
    name: breezy-auth-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/services/auth-service/Dockerfile.prod
    dockerContext: ./backend/services/auth-service
    envVars:
      - key: PORT
        value: 5001
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: USER_SERVICE_URL
        value: http://breezy-user-service:3001
      - key: PROFILE_SERVICE_URL
        value: http://breezy-profile-service:3004
      - key: DATABASE_URL
        fromDatabase:
          name: breezy-pg
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

  - type: pserv
    name: breezy-post-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/services/post-service/Dockerfile.prod
    dockerContext: ./backend/services/post-service
    envVars:
      - key: PORT
        value: 3003
      - key: MONGO_URI
        sync: false

  - type: pserv
    name: breezy-profile-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/services/profile-service/Dockerfile.prod
    dockerContext: ./backend/services/profile-service
    envVars:
      - key: PORT
        value: 3004
      - key: MONGO_URI
        sync: false

  - type: pserv
    name: breezy-media-service
    runtime: docker
    plan: free
    dockerfilePath: ./backend/services/media-service/Dockerfile.prod
    dockerContext: ./backend/services/media-service
    envVars:
      - key: PORT
        value: 3005
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: 443
      - key: MINIO_USE_SSL
        value: true
      - key: MINIO_BUCKET
        sync: false
      - key: MINIO_PUBLIC_URL
        sync: false
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false

  - type: web
    name: breezy-api-gateway
    runtime: docker
    plan: free
    dockerfilePath: ./backend/services/api-gateway/Dockerfile.prod
    dockerContext: ./backend/services/api-gateway
    envVars:
      - key: PORT
        value: 8080
      - key: CORS_ORIGIN
        value: https://breezy-frontend.onrender.com
      - key: AUTH_SERVICE_URL
        value: http://breezy-auth-service:5001
      - key: USER_SERVICE_URL
        value: http://breezy-user-service:3001
      - key: POST_SERVICE_URL
        value: http://breezy-post-service:3003
      - key: PROFILE_SERVICE_URL
        value: http://breezy-profile-service:3004
      - key: MEDIA_SERVICE_URL
        value: http://breezy-media-service:3005
      - key: REDIS_URL
        fromService:
          name: breezy-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        sync: false

  - type: web
    name: breezy-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_GATEWAY_URL
        value: https://breezy-api-gateway.onrender.com
