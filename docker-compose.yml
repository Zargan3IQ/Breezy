services:
  # ==========================================
  # USER SERVICE (PostgreSQL)
  # ==========================================
  user-db:
    image: postgres:15-alpine
    container_name: breezy-user-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: breezy_user_db
    ports:
      - "5432:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data

  user-service:
    build:
      context: ./backend/services/user-service
      dockerfile: Dockerfile
    container_name: breezy-user-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:password@user-db:5432/breezy_user_db
    volumes:
      - ./backend/services/user-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - user-db

  # ==========================================
  # POST SERVICE (MongoDB)
  # ==========================================
  post-db:
    image: mongo:6.0
    container_name: breezy-post-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - post_db_data:/data/db

  post-service:
    build:
      context: ./backend/services/post-service
      dockerfile: Dockerfile
    container_name: breezy-post-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://root:password@post-db:27017/breezy_post_db?authSource=admin
    volumes:
      - ./backend/services/post-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - post-db

  # ==========================================
  # PROFIL SERVICE (MongoDB)
  # ==========================================
  profil-db:
    image: mongo:6.0
    container_name: breezy-profil-db
    ports:
      - "27018:27017"
    volumes:
      - profile_db_data:/data/db

  profil-service:
    build: ./backend/services/profile-service
    container_name: breezy-profile-service
    ports:
      - "3004:3004"
    environment:
      - MONGO_URI=mongodb://profile-db:27017/profile-service
      - PORT=3004
    depends_on:
      - profil-db
    volumes:
      - ./backend/services/profile-service:/app
      - /app/node_modules

  # ==========================================
  # AUTH SERVICE (PostgreSQL)
  # ==========================================
  auth-db:
    image: postgres:15-alpine
    container_name: breezy-auth-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: breezy_auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: breezy-auth-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=postgresql://postgres:password@auth-db:5432/breezy_auth_db
      - JWT_SECRET=change_this_secret_in_production
      - JWT_REFRESH_SECRET=change_this_refresh_secret_in_production
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - USER_SERVICE_URL=http://user-service:3001
    depends_on:
      - auth-db
      - user-service
    volumes:
      - ./backend/services/auth-service:/app
      - /app/node_modules

 # ==========================================
  # API GATEWAY
  # ==========================================
  api-gateway:
    build:
      context: ./backend/services/api-gateway
      dockerfile: Dockerfile
    container_name: breezy-api-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=change_this_secret_in_production
      - CORS_ORIGIN=http://localhost:3000
      - AUTH_SERVICE_URL=http://auth-service:5000
      - USER_SERVICE_URL=http://user-service:3001
      - POST_SERVICE_URL=http://post-service:3003
      - PROFIL_SERVICE_URL=http://profil-service:3004
    depends_on:
      - auth-service
      - user-service
      - post-service
      - profil-service
    volumes:
      - ./backend/services/api-gateway:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  user_db_data:
  post_db_data:
  profile_db_data:
  auth_db_data:
